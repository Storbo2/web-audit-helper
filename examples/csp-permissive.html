<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self' https: data:;" />
    <title>WAH CSP Permissive Fixture</title>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 24px;
            max-width: 900px;
            line-height: 1.5;
        }

        .card {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <h1>CSP Permissive</h1>
    <p>This fixture allows jsDelivr runtime loading and is intended to validate successful external auditing.</p>

    <div class="card">
        <a href="https://example.com" target="_blank">External link</a>
        <img src="http://example.com/mixed-image.png" alt="Mixed content fixture" width="240" height="120" />
    </div>

    <p>Expected behavior: bookmarklet loads WAH runtime and overlay is displayed.</p>
</body>

</html>
