name: CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js v${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Verify and install dependencies
        run: |
          # Clean install to ensure all native modules are properly resolved
          npm ci --prefer-offline --no-audit
          # Verify critical dependencies are present
          npm list rollup @rollup/rollup-linux-x64-gnu 2>/dev/null || npm ci --prefer-offline

      - name: Type checking
        run: npm run typecheck
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Verify and install dependencies
        run: |
          # Clean install to ensure all native modules are properly resolved
          npm ci --prefer-offline --no-audit
          # Verify critical dependencies are present
          npm list rollup @rollup/rollup-linux-x64-gnu 2>/dev/null || npm ci --prefer-offline

      - name: Check TypeScript strict mode
        run: npm run typecheck

  publish:
    needs: [test-and-build, lint-and-format]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.event.head_commit.message, '[skip-publish]')) ||
      (github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - run: npm ci --prefer-offline --no-audit
      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    needs: [test-and-build, lint-and-format]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ CI/CD pipeline failed"
          exit 1

      - name: Notify on success
        if: success()
        run: echo "✅ CI/CD pipeline succeeded"
